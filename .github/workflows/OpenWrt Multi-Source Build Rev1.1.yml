# ============================================================================
# OpenWrt 多源码仓库编译系统（增强版 - 整数步骤）
# ============================================================================
name: OpenWrt 多源码仓库编译系统（增强版）

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '📦 选择源码仓库和分支版本（必选）'
        type: choice
        required: true
        options:
          - 'openwrt/openwrt - main'
          - 'openwrt/openwrt - lede-17.01'
          - 'openwrt/openwrt - master'
          - 'openwrt/openwrt - openwrt-18.06'
          - 'openwrt/openwrt - openwrt-19.07'
          - 'openwrt/openwrt - openwrt-21.02'
          - 'openwrt/openwrt - openwrt-22.03'
          - 'openwrt/openwrt - openwrt-23.05'
          - 'openwrt/openwrt - openwrt-24.10'
          - 'openwrt/openwrt - openwrt-25.12'

          - 'coolsnowwolf/lede - master'
		  
          - 'ImmortalWrt/immortalwrt - master'
          - 'ImmortalWrt/immortalwrt - openwrt-25.12'
          - 'ImmortalWrt/immortalwrt - openwrt-24.10'
          - 'ImmortalWrt/immortalwrt - openwrt-23.05'
          - 'ImmortalWrt/immortalwrt - openwrt-21.02'
          - 'ImmortalWrt/immortalwrt - openwrt-18.06'
          - 'ImmortalWrt/immortalwrt - openwrt-18.06-k5.4'
		  
          - 'DIY1 - master'
          - 'DIY1 - openwrt-25.12'
          - 'DIY1 - openwrt-24.10'
          - 'DIY1 - openwrt-23.05'
          - 'DIY1 - openwrt-21.02'
          - 'DIY1 - openwrt-18.06'
          - 'DIY1 - openwrt-18.06-k5.4'
		  
          - 'DIY2 - master'
		  
          - 'DIY3 - main'
          - 'DIY3 - lede-17.01'
          - 'DIY3 - master'
          - 'DIY3 - openwrt-18.06'
          - 'DIY3 - openwrt-19.07'
          - 'DIY3 - openwrt-21.02'
          - 'DIY3 - openwrt-22.03'
          - 'DIY3 - openwrt-23.05'
          - 'DIY3 - openwrt-24.10'
          - 'DIY3 - openwrt-25.12'
		  
          - 'custom - custom'
      version_tag:
        description: '🏷️ 指定版本标签（可选）'
        type: string
        required: false
        default: ''
        placeholder: '例如: v23.05.6, latest, branch（留空自动选择最新正式版）'
      custom_url:
        description: '🔗 自定义仓库 URL（仅当选择 custom 时必填）'
        type: string
        required: false
        placeholder: '例如: https://github.com/yourname/yourrepo'
      custom_branch:
        description: '🌿 自定义分支名称（仅当选择 custom 时必填）'
        type: string
        required: false
        placeholder: '例如: master, openwrt-23.05'
      enable_ssh_debug:
        description: '🐞 是否启用 SSH 远程配置 .config 文件'
        type: boolean
        required: false
        default: false

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_BIN_DIR: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    name: OpenWrt 编译任务

    steps:
      # ======================================================================
      # 第一步：解析仓库和分支
      # ======================================================================
      - name: '第一步：解析仓库和分支'
        id: parse_repo
        run: |
          echo "================================================================"
          echo "📦 开始解析仓库和分支配置..."
          echo "================================================================"
          
          INPUT="${{ github.event.inputs.source_branch }}"
          CUSTOM_URL="${{ github.event.inputs.custom_url }}"
          CUSTOM_BRANCH="${{ github.event.inputs.custom_branch }}"
          
          REPO_NAME=$(echo "$INPUT" | cut -d'-' -f1 | xargs)
          BRANCH_NAME=$(echo "$INPUT" | cut -d'-' -f2- | xargs)
          
          echo "📦 选择的选项: $INPUT"
          echo "📦 仓库名: $REPO_NAME"
          echo "📦 分支: $BRANCH_NAME"
          
          case "$REPO_NAME" in
            "openwrt/openwrt")
              REPO_URL="https://github.com/openwrt/openwrt"
              REPO_DIR="openwrt"
              CONFIG_FILE="configs/openwrt.config"
              ;;
            "coolsnowwolf/lede")
              REPO_URL="https://github.com/coolsnowwolf/lede"
              REPO_DIR="lede"
              CONFIG_FILE="configs/lede.config"
              ;;
            "ImmortalWrt/immortalwrt")
              REPO_URL="https://github.com/ImmortalWrt/immortalwrt"
              REPO_DIR="immortalwrt"
              CONFIG_FILE="configs/immortalwrt.config"
              ;;
            "DIY1")
              REPO_URL="https://github.com/qq784790529/immortalwrt"
              REPO_DIR="diy1"
              CONFIG_FILE="configs/diy1.config"
              ;;
            "DIY2")
              REPO_URL="https://github.com/qq784790529/lede"
              REPO_DIR="diy2"
              CONFIG_FILE="configs/diy2.config"
              ;;
            "DIY3")
              REPO_URL="https://github.com/qq784790529/openwrt"
              REPO_DIR="diy3"
              CONFIG_FILE="configs/diy3.config"
              ;;
            "custom")
              if [ -z "$CUSTOM_URL" ] || [ -z "$CUSTOM_BRANCH" ]; then
                echo "❌ 错误：选择 custom 时必须填写仓库 URL 和分支！"
                exit 1
              fi
              REPO_URL="$CUSTOM_URL"
              REPO_DIR=$(basename "$CUSTOM_URL" .git)
              BRANCH_NAME="$CUSTOM_BRANCH"
              CONFIG_FILE="configs/custom.config"
              ;;
            *)
              echo "❌ 未知的仓库选项: $REPO_NAME"
              exit 1
              ;;
          esac
          
          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
          echo "REPO_DIR=$REPO_DIR" >> $GITHUB_ENV
          echo "REPO_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
          
          echo "================================================================"
          echo "✅ 仓库解析完成"
          echo "================================================================"

      # ======================================================================
      # 第二步：检出当前仓库（获取配置文件、脚本等）
      # ======================================================================
      - name: '第二步：检出当前仓库'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ======================================================================
      # 第三步：安装编译依赖
      # ======================================================================
      - name: '第三步：安装编译依赖'
        run: |
          echo "================================================================"
          echo "🔧 开始安装编译依赖..."
          echo "================================================================"
          sudo apt update -y
          sudo apt purge -y firefox
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
          mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools \
          libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev python3-setuptools
          echo "================================================================"
          echo "✅ 编译依赖安装完成"
          echo "================================================================"

      # ======================================================================
      # 第四步：克隆源码仓库（智能版本选择）
      # ======================================================================
      - name: '第四步：克隆源码仓库（智能版本选择）'
        run: |
          echo "================================================================"
          echo "📦 开始克隆源码仓库..."
          echo "================================================================"
          echo "📦 仓库地址: ${{ env.REPO_URL }}"
          echo "🌿 仓库目录: ${{ env.REPO_DIR }}"
          echo "🌿 选择的分支/标签: ${{ env.REPO_BRANCH }}"
          echo "🏷️  用户指定版本: ${{ github.event.inputs.version_tag }}"
          echo ""
          
          normalize_version() {
            local ver="$1"
            local major=$(echo "$ver" | cut -d. -f1)
            local minor=$(echo "$ver" | cut -d. -f2 | sed 's/^0*//')
            minor=$(printf "%02d" "$minor")
            echo "$major.$minor"
          }
          
          MAJOR=""
          MINOR=""
          BASE_VERSION=""
          
          if [[ "${{ env.REPO_BRANCH }}" =~ openwrt-([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR=$(normalize_version "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}")
            BASE_VERSION="$MINOR"
            echo "🔍 分支名匹配 openwrt-X.Y 格式 → 标准化版本: $MINOR"
          else
            BASE_VERSION="${{ env.REPO_BRANCH }}"
            echo "🔍 使用原始分支名: $BASE_VERSION"
            if [[ "$BASE_VERSION" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR=$(normalize_version "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}")
              echo "   → 标准化版本: $MINOR"
            fi
          fi
          echo ""
          
          USER_VERSION="${{ github.event.inputs.version_tag }}"
          CLONE_VERSION=""
          CLONE_TYPE="branch"
          
          if [ -n "$USER_VERSION" ]; then
            echo "💡 用户指定版本: $USER_VERSION"
            if [ "$USER_VERSION" = "latest" ]; then
              echo "🔍 自动选择最新正式版..."
              if [ -n "$MINOR" ]; then
                MAJOR_STANDARD=$(echo "$MINOR" | cut -d. -f1)
                MINOR_STANDARD=$(echo "$MINOR" | cut -d. -f2)
                for i in {1..3}; do
                  TAGS=$(git ls-remote --tags ${{ env.REPO_URL }} 2>/dev/null | \
                    grep -E "refs/tags/v${MAJOR_STANDARD}\.0*${MINOR_STANDARD}\.[0-9]+$" | \
                    awk '{print $2}' | sed 's|refs/tags/||' | sort -Vr)
                  if [ -n "$TAGS" ] || [ $i -eq 3 ]; then break; fi
                  sleep 5
                done
                if [ -n "$TAGS" ]; then
                  CLONE_VERSION=$(echo "$TAGS" | head -n1)
                  CLONE_TYPE="tag"
                  echo "✅ 选择最新稳定版: $CLONE_VERSION"
                else
                  CLONE_VERSION="${{ env.REPO_BRANCH }}"
                  echo "⚠️ 未找到稳定版，使用分支: $CLONE_VERSION"
                fi
              else
                TAGS=$(git ls-remote --tags ${{ env.REPO_URL }} 2>/dev/null | grep -E "refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$" | awk '{print $2}' | sed 's|refs/tags/||' | sort -Vr)
                if [ -n "$TAGS" ]; then
                  CLONE_VERSION=$(echo "$TAGS" | head -n1)
                  CLONE_TYPE="tag"
                else
                  CLONE_VERSION="${{ env.REPO_BRANCH }}"
                fi
              fi
            elif [ "$USER_VERSION" = "branch" ]; then
              CLONE_VERSION="${{ env.REPO_BRANCH }}"
              echo "✅ 强制使用分支: $CLONE_VERSION"
            else
              echo "🔍 检查指定版本: $USER_VERSION"
              if git ls-remote --exit-code --tags ${{ env.REPO_URL }} "refs/tags/$USER_VERSION" 2>/dev/null; then
                echo "✅ 版本存在: $USER_VERSION"
                COMMIT_HASH=$(git ls-remote ${{ env.REPO_URL }} "refs/tags/$USER_VERSION" | awk '{print $1}')
                if [ -n "$COMMIT_HASH" ] && [ "$COMMIT_HASH" != "0000000000000000000000000000000000000000" ]; then
                  CLONE_VERSION="$USER_VERSION"
                  CLONE_TYPE="tag"
                else
                  CLONE_VERSION="${{ env.REPO_BRANCH }}"
                fi
              else
                echo "❌ 版本不存在: $USER_VERSION"
                exit 1
              fi
            fi
          else
            echo "💡 未指定版本，自动选择最新正式版..."
            if [ -n "$MINOR" ]; then
              MAJOR_STANDARD=$(echo "$MINOR" | cut -d. -f1)
              MINOR_STANDARD=$(echo "$MINOR" | cut -d. -f2)
              for i in {1..3}; do
                TAGS=$(git ls-remote --tags ${{ env.REPO_URL }} 2>/dev/null | \
                  grep -E "refs/tags/v${MAJOR_STANDARD}\.0*${MINOR_STANDARD}\.[0-9]+$" | \
                  awk '{print $2}' | sed 's|refs/tags/||' | sort -Vr)
                if [ -n "$TAGS" ] || [ $i -eq 3 ]; then break; fi
                sleep 5
              done
              if [ -n "$TAGS" ]; then
                CLONE_VERSION=$(echo "$TAGS" | head -n1)
                CLONE_TYPE="tag"
                echo "✅ 自动选择最新稳定版: $CLONE_VERSION"
              else
                CLONE_VERSION="${{ env.REPO_BRANCH }}"
                echo "⚠️ 未发现稳定版，使用分支: $CLONE_VERSION"
              fi
            else
              TAGS=$(git ls-remote --tags ${{ env.REPO_URL }} 2>/dev/null | grep -E "refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$" | awk '{print $2}' | sed 's|refs/tags/||' | sort -Vr)
              if [ -n "$TAGS" ]; then
                CLONE_VERSION=$(echo "$TAGS" | head -n1)
                CLONE_TYPE="tag"
              else
                CLONE_VERSION="${{ env.REPO_BRANCH }}"
              fi
            fi
          fi
          
          echo ""
          echo "📍 克隆版本: $CLONE_VERSION / 类型: $CLONE_TYPE"
          CLONE_SUCCESS=false
          rm -rf ${{ env.REPO_DIR }}
          
          if [ "$CLONE_TYPE" = "tag" ]; then
            echo "🏷️  克隆标签版本..."
            if git clone -b "$CLONE_VERSION" --single-branch --depth=1 ${{ env.REPO_URL }} ${{ env.REPO_DIR }} 2>&1; then
              CLONE_SUCCESS=true
              echo "✅ 成功克隆 tag: $CLONE_VERSION"
            else
              echo "⚠️ tag 克隆失败，尝试 commit 模式..."
              COMMIT_HASH=$(git ls-remote ${{ env.REPO_URL }} "refs/tags/$CLONE_VERSION" | awk '{print $1}')
              if [ -n "$COMMIT_HASH" ]; then
                git clone --single-branch --depth=1 ${{ env.REPO_URL }} ${{ env.REPO_DIR }}
                cd ${{ env.REPO_DIR }}
                git checkout $COMMIT_HASH
                cd ..
                CLONE_SUCCESS=true
                echo "✅ 成功克隆 commit: $COMMIT_HASH"
              fi
            fi
          else
            echo "🌿 克隆分支版本..."
            if git clone -b "$CLONE_VERSION" --single-branch --depth=1 ${{ env.REPO_URL }} ${{ env.REPO_DIR }} 2>&1; then
              CLONE_SUCCESS=true
              echo "✅ 成功克隆分支: $CLONE_VERSION"
            fi
          fi
          
          if [ "$CLONE_SUCCESS" = true ]; then
            cd ${{ env.REPO_DIR }}
            echo "📍 当前 HEAD:"
            git log -1 --oneline
          else
            echo "❌ 克隆失败，退出"
            exit 1
          fi

      # ======================================================================
      # 第五步：执行 DIY 脚本 Part 1（可选）
      # ======================================================================
      - name: '第五步：执行 DIY 脚本 Part 1'
        if: env.DIY_P1_SH != ''
        run: |
          echo "🔧 执行 DIY 脚本 Part 1..."
          cd ${{ env.REPO_DIR }}
          if [ -f "../${{ env.DIY_P1_SH }}" ]; then
            chmod +x "../${{ env.DIY_P1_SH }}"
            bash "../${{ env.DIY_P1_SH }}"
          else
            echo "⚠️ DIY 脚本 Part 1 不存在: ${{ env.DIY_P1_SH }}"
          fi

      # ======================================================================
      # 第六步：更新和安装 feeds
      # ======================================================================
      - name: '第六步：更新和安装 feeds'
        run: |
          echo "🔄 更新和安装 feeds..."
          cd ${{ env.REPO_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ Feeds 更新和安装完成"

      # ======================================================================
      # 第七步：执行 DIY 脚本 Part 2（可选）
      # ======================================================================
      - name: '第七步：执行 DIY 脚本 Part 2'
        if: env.DIY_P2_SH != ''
        run: |
          echo "🔧 执行 DIY 脚本 Part 2..."
          cd ${{ env.REPO_DIR }}
          if [ -f "../${{ env.DIY_P2_SH }}" ]; then
            chmod +x "../${{ env.DIY_P2_SH }}"
            bash "../${{ env.DIY_P2_SH }}"
          else
            echo "⚠️ DIY 脚本 Part 2 不存在: ${{ env.DIY_P2_SH }}"
          fi

      # ======================================================================
      # 第八步：配置 .config 文件
      # ======================================================================
      - name: '第八步：配置 .config 文件'
        run: |
          echo "📄 配置 .config 文件..."
          cd ${{ env.REPO_DIR }}
          if [ "${{ github.event.inputs.enable_ssh_debug }}" = "true" ]; then
            echo "🔧 启用 SSH 远程配置模式"
          else
            echo "🔧 使用 configs/ 目录中的配置文件"
            if [ ! -f "../${{ env.CONFIG_FILE }}" ]; then
              echo "❌ 配置文件不存在: ${{ env.CONFIG_FILE }}"
              exit 1
            fi
            rm -f .config
            cp -f "../${{ env.CONFIG_FILE }}" .config
            echo "✅ 配置文件已复制: ${{ env.CONFIG_FILE }} → .config"
          fi

      # ======================================================================
      # 第九步：SSH 远程配置 .config 文件（可选）
      # ======================================================================
      - name: '第九步：SSH 远程配置 .config 文件'
        if: ${{ github.event.inputs.enable_ssh_debug == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          timeout-minutes: 15
          limit-access-to-actor: false

      # ======================================================================
      # 第十步：验证 SSH 配置结果
      # ======================================================================
      - name: '第十步：验证 SSH 配置结果'
        if: ${{ github.event.inputs.enable_ssh_debug == 'true' }}
        run: |
          echo "✅ 验证 SSH 配置结果..."
          cd ${{ env.REPO_DIR }}
          if [ ! -f ".config" ]; then
            echo "❌ SSH 会话结束但未找到 .config 文件"
            exit 1
          fi
          echo "✅ 检测到 .config 文件"

      # ======================================================================
      # 第十一步：生成最终编译配置
      # ======================================================================
      - name: '第十一步：生成最终编译配置'
        run: |
          echo "⚙️  生成最终编译配置..."
          cd ${{ env.REPO_DIR }}
          if [ ! -f ".config" ]; then
            echo "❌ 缺少 .config 文件"
            exit 1
          fi
          cp .config .config.original
          make defconfig
          echo "✅ make defconfig 执行成功"

      # ======================================================================
      # 第十二步：替换自定义 dts/dtsi 文件（新增）
      # ======================================================================
      - name: '第十二步：替换自定义 dts/dtsi 文件'
        run: |
          echo "📄 检查并替换自定义 dts/dtsi 文件..."
          cd ${{ env.REPO_DIR }}
          CUSTOM_DTS_DIR="../custom-dts"
          if [ ! -d "$CUSTOM_DTS_DIR" ]; then
            echo "ℹ️  未找到 custom-dts 目录，跳过。"
            echo "💡 如需使用，请在仓库根目录创建 custom-dts/ 文件夹并放入 .dts/.dtsi 文件。"
          else
            echo "✅ 检测到 custom-dts/ 目录。"
            DEVICE_LINES=$(grep -E '^CONFIG_TARGET_.*_DEVICE_.*=y' .config || true)
            if [ -z "$DEVICE_LINES" ]; then
              echo "⚠️  未在 .config 中找到设备配置，跳过。"
            else
              while IFS= read -r line; do
                device_name=$(echo "$line" | sed 's/^.*_DEVICE_\(.*\)=y$/\1/')
                [ -z "$device_name" ] && continue
                echo "🔍 发现设备: $device_name"
                TARGET_BOARD=$(grep 'CONFIG_TARGET_BOARD=' .config | cut -d'"' -f2)
                [ -z "$TARGET_BOARD" ] && continue
                DTS_DIR=""
                for dir in target/linux/$TARGET_BOARD/dts*; do
                  if [ -d "$dir" ] && ls "$dir/${device_name}.dts" &>/dev/null; then
                    DTS_DIR="$dir"
                    break
                  fi
                done
                if [ -z "$DTS_DIR" ]; then
                  echo "⚠️  未找到 ${device_name}.dts，跳过。"
                  continue
                fi
                echo "📁 dts 目录: $DTS_DIR"
                REPLACED=0
                for f in "$CUSTOM_DTS_DIR"/*; do
                  if [ -f "$f" ]; then
                    fname=$(basename "$f")
                    if [ -f "$DTS_DIR/$fname" ]; then
                      echo "🔄 替换: $fname"
                      cp -f "$f" "$DTS_DIR/$fname"
                      REPLACED=$((REPLACED+1))
                    fi
                  fi
                done
                [ $REPLACED -eq 0 ] && echo "⚠️  custom-dts 中没有可替换的文件。" || echo "✅ 成功替换 $REPLACED 个文件。"
              done <<< "$DEVICE_LINES"
            fi
          fi
          echo "✅ 自定义 dts 替换检查完成"

      # ======================================================================
      # 第十三步：处理本地 IPK 包（新增）
      # ======================================================================
      - name: '第十三步：处理本地 IPK 包'
        run: |
          echo "📦 检查本地 IPK 包..."
          cd ${{ env.REPO_DIR }}
          LOCAL_IPK_DIR="../local-packages"
          if [ ! -d "$LOCAL_IPK_DIR" ]; then
            echo "ℹ️  未找到 local-packages 目录，跳过。"
            echo "💡 如需集成 ipk，请在仓库根目录创建 local-packages/ 文件夹并放入 .ipk 文件。"
          else
            IPK_COUNT=$(ls -1 "$LOCAL_IPK_DIR"/*.ipk 2>/dev/null | wc -l)
            if [ "$IPK_COUNT" -eq 0 ]; then
              echo "ℹ️  local-packages 目录为空，跳过。"
            else
              echo "✅ 检测到 $IPK_COUNT 个 IPK 文件，开始集成..."
              mkdir -p package/local-packages
              for ipk_path in "$LOCAL_IPK_DIR"/*.ipk; do
                [ -f "$ipk_path" ] || continue
                filename=$(basename "$ipk_path")
                echo "--- 处理: $filename ---"
                if ! [[ "$filename" =~ ^(.+)_([^_]+)_([^_]+)\.ipk$ ]]; then
                  echo "⚠️  文件名格式不符，跳过。"
                  continue
                fi
                pkg_name="${BASH_REMATCH[1]}"
                pkg_version="${BASH_REMATCH[2]}"
                pkg_arch="${BASH_REMATCH[3]}"
                echo "  包名: $pkg_name, 版本: $pkg_version, 架构: $pkg_arch"
                if grep -rq "Package/$pkg_name" package/feeds/ 2>/dev/null; then
                  echo "⚠️  包 $pkg_name 已存在于 feeds，跳过。"
                  continue
                fi
                if [ -d "package/local-packages/$pkg_name" ]; then
                  echo "⚠️  包 $pkg_name 已由本地 IPK 定义，跳过。"
                  continue
                fi
                pkg_dir="package/local-packages/$pkg_name"
                mkdir -p "$pkg_dir"
                mkdir -p dl
                cp "$ipk_path" "dl/$filename"
                cat > "$pkg_dir/Makefile" <<EOF
include \$(TOPDIR)/rules.mk
PKG_NAME:=$pkg_name
PKG_VERSION:=$pkg_version
PKG_RELEASE:=1
PKG_SOURCE:=$filename
PKG_SOURCE_URL:=file://\$(TOPDIR)/dl
include \$(INCLUDE_DIR)/package.mk
define Package/$pkg_name
  SECTION:=local
  CATEGORY:=Local Packages
  TITLE:=Local package: $pkg_name
endef
define Package/$pkg_name/description
  Locally provided ipk package.
endef
define Build/Prepare
endef
define Build/Compile
	mkdir -p \$(PKG_BUILD_DIR)
	ar p \$(DL_DIR)/\$(PKG_SOURCE) data.tar.gz | tar -xz -C \$(PKG_BUILD_DIR)/
endef
define Package/$pkg_name/install
	\$(INSTALL_DIR) \$(1)/
	[ -d "\$(PKG_BUILD_DIR)" ] && cp -rf \$(PKG_BUILD_DIR)/* \$(1)/ 2>/dev/null || true
endef
\$(eval \$(call BuildPackage,$pkg_name))
EOF
                echo "✅ 已生成 Makefile"
                if ! grep -q "CONFIG_PACKAGE_${pkg_name}=y" .config; then
                  echo "CONFIG_PACKAGE_${pkg_name}=y" >> .config
                  echo "   → 已自动启用该包。"
                fi
              done
              make defconfig 2>/dev/null || true
            fi
          fi
          echo "✅ 本地 IPK 处理完成"

      # ======================================================================
      # 第十四步：下载 .config 中要求的包源码
      # ======================================================================
      - name: '第十四步：下载 .config 中要求的包源码'
        run: |
          echo "📥 下载包源码..."
          cd ${{ env.REPO_DIR }}
          if [ ! -f ".config" ]; then
            echo "❌ 缺少 .config 文件"
            exit 1
          fi
          CPU_CORES=$(nproc)
          make download -j$CPU_CORES || make download -j1 V=s
          echo "✅ 源码下载完成"

      # ======================================================================
      # 第十五步：编译 OpenWrt
      # ======================================================================
      - name: '第十五步：编译 OpenWrt'
        run: |
          echo "🔨 开始编译 OpenWrt..."
          cd ${{ env.REPO_DIR }}
          CPU_CORES=$(nproc)
          make V=s -j$CPU_CORES || make V=s -j1
          echo "✅ 编译完成"

      # ======================================================================
      # 第十六步：上传 SSH 生成的 .config 文件（可选）
      # ======================================================================
      - name: '第十六步：上传 SSH 生成的 .config 文件'
        if: ${{ github.event.inputs.enable_ssh_debug == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ssh-generated-config
          path: ${{ env.REPO_DIR }}/.config
          retention-days: 7
        continue-on-error: true

      # ======================================================================
      # 第十七步：上传刷机包文件
      # ======================================================================
      - name: '第十七步：上传刷机包文件'
        if: env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: |
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-squashfs-sysupgrade.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-squashfs-factory.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-ext4-sysupgrade.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-ext4-factory.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-initramfs-kernel.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-kernel.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-rootfs.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*.img
          retention-days: 7
        continue-on-error: true

      # ======================================================================
      # 第十八步：上传 bin 目录（可选）
      # ======================================================================
      - name: '第十八步：上传 bin 目录'
        if: env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bin
          path: ${{ env.REPO_DIR }}/bin
          retention-days: 7

      # ======================================================================
      # 第十九步：发布到 Release（可选）
      # ======================================================================
      - name: '第十九步：发布到 Release'
        if: env.UPLOAD_RELEASE == 'true' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-squashfs-sysupgrade.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-squashfs-factory.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-ext4-sysupgrade.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-ext4-factory.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-initramfs-kernel.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-kernel.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*-rootfs.bin
            ${{ env.REPO_DIR }}/bin/targets/*/*/*.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
